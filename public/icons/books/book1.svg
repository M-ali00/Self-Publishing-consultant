<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Pages edge -->
  <rect x="44" y="4" width="10" height="72" fill="#f0f4f4" rx="1"/>
  <line x1="46" y1="4" x2="46" y2="76" stroke="#d1d5db" stroke-width="0.4"/>
  <line x1="49" y1="4" x2="49" y2="76" stroke="#d1d5db" stroke-width="0.4"/>
  <!-- Cover -->
  <rect x="7" y="2" width="39" height="76" fill="#064e3b" rx="3"/>
