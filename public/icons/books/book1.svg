  <rect x="16" y="14" width="22" height="1.5" fill="rgba(255,255,255,0.35)" rx="1"/>
  <rect x="16" y="22" width="18" height="1" fill="rgba(255,255,255,0.2)" rx="1"/>
  <rect x="16" y="27" width="20" height="1" fill="rgba(255,255,255,0.2)" rx="1"/>
  <!-- Small star decoration -->
  <circle cx="27" cy="50" r="3" fill="rgba(252,211,77,0.6)"/>
  <line x1="27" y1="45" x2="27" y2="55" stroke="rgba(252,211,77,0.4)" stroke-width="0.8"/>
  <line x1="22" y1="50" x2="32" y2="50" stroke="rgba(252,211,77,0.4)" stroke-width="0.8"/>
</svg>
